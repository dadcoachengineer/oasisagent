# Known fixes for Docker container failures.
# Evaluated by the T0 match engine — first match wins.
# See ARCHITECTURE.md §5 for match semantics.
#
# Note: payload_contains patterns assume Docker event payloads as
# serialized JSON. Exact key names depend on the ingestion adapter's
# event normalization. Refine patterns once the Docker ingestion
# adapter is implemented.

fixes:
  - id: docker-oomkilled
    match:
      system: docker
      event_type: container_die
      payload_contains: "OOMKilled"
    diagnosis: "Container was OOM-killed — memory limit exceeded"
    action:
      type: auto_fix
      handler: docker
      operation: restart_container
      details:
        message: "OOM-killed container restarted — review memory limits"
    risk_tier: auto_fix

  - id: docker-healthcheck-failure
    match:
      system: docker
      event_type: health_status_unhealthy
    diagnosis: "Container health check is failing"
    action:
      type: auto_fix
      handler: docker
      operation: restart_container
      details:
        message: "Unhealthy container restarted via health check trigger"
    risk_tier: auto_fix

  - id: docker-exit-137
    match:
      system: docker
      event_type: container_die
      payload_contains: "exitCode\":137"
    diagnosis: "Container received SIGKILL (exit code 137) — possibly OOM or external kill"
    action:
      type: auto_fix
      handler: docker
      operation: restart_container
      details:
        message: "Container killed with SIGKILL — restarted, check logs for root cause"
    risk_tier: auto_fix

  - id: docker-crash-loop
    match:
      system: docker
      event_type: container_die
      payload_contains: "RestartCount"
    diagnosis: "Container is in a crash loop — repeated restarts detected"
    action:
      type: recommend
      handler: docker
      operation: inspect_container
      details:
        message: "Container crash loop detected — escalating for human review"
    risk_tier: escalate

  - id: docker-volume-mount-failed
    match:
      system: docker
      event_type: container_start_error
      payload_contains: "mount"
    diagnosis: "Container failed to start due to a volume mount error — path missing, permissions, or stale NFS mount"
    action:
      type: recommend
      handler: docker
      operation: notify
      details:
        message: |
          Volume mount failure. Diagnostic checklist:
          1. Verify the host path exists and has correct permissions
          2. Check if NFS/CIFS mounts are available (showmount, mount)
          3. Look for stale mounts that need remounting
          4. Verify SELinux/AppArmor labels if applicable
          5. Check Docker volume driver logs for errors
    risk_tier: recommend

  - id: docker-image-pull-failed
    match:
      system: docker
      event_type: image_pull_error
    diagnosis: "Docker image pull failed — registry unreachable, auth error, or image not found"
    action:
      type: recommend
      handler: docker
      operation: notify
      details:
        message: |
          Image pull failure. Diagnostic checklist:
          1. Verify registry connectivity (ping, curl the registry URL)
          2. Check registry authentication credentials (docker login)
          3. Confirm the image name and tag exist in the registry
          4. Check for rate limiting (Docker Hub: 100 pulls/6h for anonymous)
          5. Review DNS resolution for the registry hostname
          6. Check disk space — pulls fail if /var/lib/docker is full
    risk_tier: recommend
