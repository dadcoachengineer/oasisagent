fixes:
  - id: unifi-ap-disconnected
    match:
      system: unifi
      event_type: device_disconnected
    diagnosis: "UniFi device is offline — may need power cycle or firmware recovery"
    action:
      type: recommend
      handler: unifi
      operation: notify
      details:
        message: |
          Device disconnected. Checklist:
          1. Check PoE port on upstream switch
          2. Verify physical cabling
          3. Check switch port status in UniFi
          4. If PoE switch port is up, device may need hardware replacement
    risk_tier: recommend

  - id: unifi-device-high-cpu
    match:
      system: unifi
      event_type: device_high_cpu
    diagnosis: "UniFi device CPU is critically high — may indicate firmware bug or excessive load"
    action:
      type: recommend
      handler: unifi
      operation: restart_device
      details:
        message: "Device CPU critical — recommend restart if sustained"
    risk_tier: recommend

  - id: unifi-device-high-memory
    match:
      system: unifi
      event_type: device_high_mem
    diagnosis: "UniFi device memory usage is critically high — possible memory leak or firmware bug"
    action:
      type: recommend
      handler: unifi
      operation: restart_device
      details:
        message: "Device memory critical — recommend restart"
    risk_tier: recommend

  - id: unifi-wan-failover
    match:
      system: unifi
      event_type: wan_failover
    diagnosis: "Primary WAN link failed over to secondary — ISP outage or modem issue"
    action:
      type: escalate
      handler: unifi
      operation: notify
      details:
        message: |
          WAN failover detected. Steps:
          1. Check ISP modem status and indicator lights
          2. Verify modem to gateway cable connection
          3. Test with direct connection to modem (bypass gateway)
          4. Check ISP outage status page
          5. If modem shows connected, check gateway WAN port
    risk_tier: escalate

  - id: unifi-alarm
    match:
      system: unifi
      event_type: alarm
    diagnosis: "UniFi alarm triggered — review the alarm details for impact assessment"
    action:
      type: recommend
      handler: unifi
      operation: notify
      details:
        message: "UniFi alarm detected — check controller for details"
    risk_tier: recommend

  - id: unifi-ids-alert
    match:
      system: unifi
      event_type: ids_alert
    diagnosis: "IDS/IPS detection — potential intrusion or malicious traffic identified"
    action:
      type: recommend
      handler: unifi
      operation: notify
      details:
        message: |
          IDS/IPS alert triggered. Review:
          1. Check source and destination IPs
          2. Evaluate threat signature and category
          3. Determine if traffic is legitimate or malicious
          4. Consider blocking source IP if confirmed threat
    risk_tier: recommend

  - id: unifi-rogue-ap
    match:
      system: unifi
      event_type: rogue_ap_detected
    diagnosis: "Rogue access point detected — unauthorized wireless device on network perimeter"
    action:
      type: escalate
      handler: unifi
      operation: notify
      details:
        message: |
          Rogue AP detected. Investigation steps:
          1. Identify the BSSID and SSID of the rogue AP
          2. Check if this is a known neighbor or legitimate device
          3. Assess signal strength to determine proximity
          4. If unauthorized, locate and remove or block the device
    risk_tier: escalate

  - id: unifi-network-anomaly
    match:
      system: unifi
      event_type: network_anomaly
    diagnosis: "Network traffic anomaly detected — unusual pattern may indicate issue or attack"
    action:
      type: recommend
      handler: unifi
      operation: notify
      details:
        message: |
          Network anomaly detected. Review:
          1. Check anomaly type and affected metrics
          2. Correlate with recent network changes
          3. Review client activity for unusual patterns
          4. Monitor for recurrence
    risk_tier: recommend
