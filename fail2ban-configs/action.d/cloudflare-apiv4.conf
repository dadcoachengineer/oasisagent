# Fail2Ban action: Cloudflare API v4 — ban/unban IPs at the edge
#
# Creates Cloudflare User-level Firewall Access Rules to block offending IPs
# before they ever reach your origin. Works with Cloudflare Tunnel architecture.
#
# SETUP:
#   Set these environment variables on the fail2ban container:
#     CF_USER   — Cloudflare account email (e.g. jason@shearer.live)
#     CF_TOKEN  — Cloudflare Global API Key
#
# Ref: https://developers.cloudflare.com/api/operations/user-level-firewall-access-rule-create-an-access-rule

[Definition]

actionstart =
actionstop =
actioncheck =

# Ban: create a Cloudflare firewall rule blocking this IP
actionban = curl -s -o /dev/null -X POST \
              "https://api.cloudflare.com/client/v4/user/firewall/access_rules/rules" \
              -H "X-Auth-Email: $CF_USER" \
              -H "X-Auth-Key: $CF_TOKEN" \
              -H "Content-Type: application/json" \
              --data '{"mode":"block","configuration":{"target":"ip","value":"<ip>"},"notes":"<name> - Ban by Fail2Ban <bantime>s"}'

# Unban: find and delete the Cloudflare firewall rule for this IP
actionunban = id=$(curl -s \
                "https://api.cloudflare.com/client/v4/user/firewall/access_rules/rules?mode=block&configuration_target=ip&configuration_value=<ip>&page=1&per_page=1" \
                -H "X-Auth-Email: $CF_USER" \
                -H "X-Auth-Key: $CF_TOKEN" \
                -H "Content-Type: application/json" | jq -r '.result[0].id // empty') && \
              [ -n "$id" ] && \
              curl -s -o /dev/null -X DELETE \
                "https://api.cloudflare.com/client/v4/user/firewall/access_rules/rules/$id" \
                -H "X-Auth-Email: $CF_USER" \
                -H "X-Auth-Key: $CF_TOKEN" \
                -H "Content-Type: application/json"

[Init]
# Credentials come from container environment variables CF_USER and CF_TOKEN
# Set these in your docker-compose / Portainer stack — NOT here

# Identifier in Cloudflare firewall rule notes — makes rules easy to find/audit
name = oasis-fail2ban
