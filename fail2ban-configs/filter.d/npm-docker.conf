# Fail2Ban filter for Nginx Proxy Manager (LXC / non-Docker)
#
# Matches NPM's default log format:
#   [15/Mar/2026:11:10:39 -0500] - 403 403 - GET https oasis.shearer.live "/path" [Client 1.2.3.4] [Length 26] [Gzip -] [Sent-to 192.168.1.100] "UA" "Referer"
#
# We match 4xx status codes (client errors: auth failures, forbidden, not found scanning, etc.)
# The real client IP comes from [Client <HOST>] which NPM populates via real_ip / CF-Connecting-IP.
#
# NOTE: NPM logs the status code twice (upstream status + final status). We anchor on the first one.

[Definition]

# Match any 4xx response with real client IP in [Client ...] block
# Covers: 400 Bad Request, 401 Unauthorized, 403 Forbidden, 404 Not Found, 405, 408, 429, etc.
failregex = ^\[.+\] - 4\d\d \d+ - \S+ \S+ \S+ ".+" \[Client <HOST>\]

# Ignore legitimate status codes (2xx, 3xx redirects, 5xx server errors)
ignoreregex =
