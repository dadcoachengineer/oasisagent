# OasisAgent Docker Compose
#
# Usage:
#   docker compose up                        → agent only (default)
#   docker compose --profile monitoring up   → agent + bundled InfluxDB
#
# Prerequisites:
#   - Copy config.example.yaml → config.yaml and customize
#   - Copy .env.example → .env and fill in secrets
#   - Create known_fixes/ directory with your T0 YAML files

services:
  oasisagent:
    build: .
    container_name: oasisagent
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./known_fixes:/app/known_fixes:ro
      # Phase 2: Uncomment for Docker handler
      # - /var/run/docker.sock:/var/run/docker.sock:ro
    # For home lab setups where HA, EMQX, and InfluxDB are on the local network,
    # host networking is the simplest option — no port mapping or extra_hosts needed:
    # network_mode: host
    #
    # Alternative: bridge networking with explicit host mappings:
    # extra_hosts:
    #   - "homeassistant:192.168.1.120"
    #   - "emqx:192.168.1.120"
    #   - "influxdb:192.168.1.120"

  # Bundled InfluxDB for audit logging.
  # Activate with: docker compose --profile monitoring up
  # If you already run InfluxDB elsewhere, skip this and point
  # config.yaml → audit.influxdb.url at your existing instance.
  influxdb:
    image: influxdb:2-alpine
    profiles: ["monitoring"]
    container_name: oasisagent-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_INIT_USERNAME:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_INIT_PASSWORD:-changeme}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_INIT_ORG:-myorg}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_INIT_BUCKET:-oasisagent}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}

volumes:
  influxdb-data:
