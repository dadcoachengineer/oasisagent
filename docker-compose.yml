services:
  oasisagent:
    build: .
    container_name: oasisagent
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./known_fixes:/app/known_fixes:ro
      # Phase 2: Uncomment for Docker handler
      # - /var/run/docker.sock:/var/run/docker.sock:ro
