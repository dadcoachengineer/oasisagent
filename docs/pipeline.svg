<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="pbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 6" refX="10" refY="3"
            markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M0,0 L10,3 L0,6" fill="#475569"/>
    </marker>
    <marker id="arr-cyan" viewBox="0 0 10 6" refX="10" refY="3"
            markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M0,0 L10,3 L0,6" fill="#22d3ee"/>
    </marker>
    <marker id="arr-warn" viewBox="0 0 10 6" refX="10" refY="3"
            markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M0,0 L10,3 L0,6" fill="#f59e0b"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 6" refX="10" refY="3"
            markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M0,0 L10,3 L0,6" fill="#34d399"/>
    </marker>
  </defs>
  <rect width="800" height="420" rx="12" fill="url(#pbg)"/>

  <!-- Title -->
  <text x="400" y="26" font-family="system-ui, -apple-system, sans-serif"
        font-size="13" fill="#64748b" text-anchor="middle" font-weight="600"
        letter-spacing="2">v1.0.0 ARCHITECTURE</text>

  <!-- ================================================================== -->
  <!-- ROW 1: Sources → Queue + Correlation → Decision Engine → Guardrails -->
  <!-- ================================================================== -->

  <!-- Ingestion Sources -->
  <g transform="translate(14, 44)">
    <rect width="120" height="102" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="60" y="17" font-family="system-ui, sans-serif" font-size="10"
          fill="#64748b" text-anchor="middle" font-weight="600" letter-spacing="1">24 ADAPTERS</text>
    <text x="60" y="34" font-family="ui-monospace, monospace" font-size="9"
          fill="#22d3ee" text-anchor="middle">HA / Portainer</text>
    <text x="60" y="47" font-family="ui-monospace, monospace" font-size="9"
          fill="#22d3ee" text-anchor="middle">Proxmox / UniFi</text>
    <text x="60" y="60" font-family="ui-monospace, monospace" font-size="9"
          fill="#22d3ee" text-anchor="middle">Plex / Servarr</text>
    <text x="60" y="73" font-family="ui-monospace, monospace" font-size="9"
          fill="#22d3ee" text-anchor="middle">MQTT / Webhooks</text>
    <text x="60" y="86" font-family="ui-monospace, monospace" font-size="9"
          fill="#475569" text-anchor="middle">+ 5 scanners</text>
    <text x="60" y="98" font-family="ui-monospace, monospace" font-size="8"
          fill="#475569" text-anchor="middle">HTTP / Cloudflare / ...</text>
  </g>

  <!-- Arrow: Sources → Queue -->
  <line x1="138" y1="95" x2="160" y2="95" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Event Queue + Correlation -->
  <g transform="translate(164, 63)">
    <rect width="98" height="64" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="49" y="17" font-family="system-ui, sans-serif" font-size="10"
          fill="#64748b" text-anchor="middle" font-weight="600" letter-spacing="1">EVENT QUEUE</text>
    <text x="49" y="34" font-family="ui-monospace, monospace" font-size="9"
          fill="#94a3b8" text-anchor="middle">dedup window</text>
    <text x="49" y="47" font-family="ui-monospace, monospace" font-size="9"
          fill="#94a3b8" text-anchor="middle">correlation</text>
    <text x="49" y="60" font-family="ui-monospace, monospace" font-size="9"
          fill="#94a3b8" text-anchor="middle">backpressure</text>
  </g>

  <!-- Arrow: Queue → Decision -->
  <line x1="266" y1="95" x2="288" y2="95" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Decision Engine -->
  <g transform="translate(292, 50)">
    <rect width="280" height="90" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
    <text x="140" y="17" font-family="system-ui, sans-serif" font-size="10"
          fill="#94a3b8" text-anchor="middle" font-weight="600" letter-spacing="1">DECISION ENGINE</text>

    <!-- T0 -->
    <rect x="10" y="26" width="76" height="52" rx="4" fill="#0f172a" stroke="#22d3ee" stroke-width="1"/>
    <text x="48" y="44" font-family="ui-monospace, monospace" font-size="11"
          fill="#22d3ee" text-anchor="middle" font-weight="700">T0</text>
    <text x="48" y="57" font-family="system-ui, sans-serif" font-size="9"
          fill="#64748b" text-anchor="middle">Known Fixes</text>
    <text x="48" y="72" font-family="ui-monospace, monospace" font-size="8"
          fill="#475569" text-anchor="middle">19 YAML files</text>

    <!-- Arrow T0→T1 -->
    <line x1="90" y1="52" x2="98" y2="52" stroke="#475569" stroke-width="1" marker-end="url(#arr)"/>

    <!-- T1 -->
    <rect x="102" y="26" width="76" height="52" rx="4" fill="#0f172a" stroke="#818cf8" stroke-width="1"/>
    <text x="140" y="44" font-family="ui-monospace, monospace" font-size="11"
          fill="#818cf8" text-anchor="middle" font-weight="700">T1</text>
    <text x="140" y="57" font-family="system-ui, sans-serif" font-size="9"
          fill="#64748b" text-anchor="middle">Local SLM</text>
    <text x="140" y="72" font-family="ui-monospace, monospace" font-size="8"
          fill="#475569" text-anchor="middle">classify + pkg</text>

    <!-- Arrow T1→T2 -->
    <line x1="182" y1="52" x2="190" y2="52" stroke="#475569" stroke-width="1" marker-end="url(#arr)"/>

    <!-- T2 -->
    <rect x="194" y="26" width="76" height="52" rx="4" fill="#0f172a" stroke="#a78bfa" stroke-width="1"/>
    <text x="232" y="44" font-family="ui-monospace, monospace" font-size="11"
          fill="#a78bfa" text-anchor="middle" font-weight="700">T2</text>
    <text x="232" y="57" font-family="system-ui, sans-serif" font-size="9"
          fill="#64748b" text-anchor="middle">Cloud LLM</text>
    <text x="232" y="72" font-family="ui-monospace, monospace" font-size="8"
          fill="#475569" text-anchor="middle">dep context</text>
  </g>

  <!-- Arrow: Decision → Guardrails -->
  <line x1="576" y1="95" x2="598" y2="95" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Guardrails -->
  <g transform="translate(602, 56)">
    <rect width="96" height="78" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
    <text x="48" y="17" font-family="system-ui, sans-serif" font-size="10"
          fill="#f59e0b" text-anchor="middle" font-weight="600">GUARDRAILS</text>
    <text x="48" y="33" font-family="ui-monospace, monospace" font-size="8"
          fill="#64748b" text-anchor="middle">risk tiers</text>
    <text x="48" y="45" font-family="ui-monospace, monospace" font-size="8"
          fill="#64748b" text-anchor="middle">blocked domains</text>
    <text x="48" y="57" font-family="ui-monospace, monospace" font-size="8"
          fill="#64748b" text-anchor="middle">circuit breaker</text>
    <text x="48" y="69" font-family="ui-monospace, monospace" font-size="8"
          fill="#64748b" text-anchor="middle">kill switch</text>
  </g>

  <!-- Service Topology feeding into T2 -->
  <g transform="translate(430, 150)">
    <rect width="110" height="40" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="55" y="16" font-family="system-ui, sans-serif" font-size="9"
          fill="#64748b" text-anchor="middle" font-weight="600">SERVICE TOPOLOGY</text>
    <text x="55" y="32" font-family="ui-monospace, monospace" font-size="8"
          fill="#475569" text-anchor="middle">dependency graph + BFS</text>
  </g>
  <!-- Arrow: Topology → T2 (up) -->
  <line x1="485" y1="150" x2="524" y2="128" stroke="#475569" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr)"/>

  <!-- Cross-Domain Correlator -->
  <g transform="translate(164, 150)">
    <rect width="140" height="40" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="70" y="16" font-family="system-ui, sans-serif" font-size="9"
          fill="#64748b" text-anchor="middle" font-weight="600">CROSS-DOMAIN CORRELATOR</text>
    <text x="70" y="32" font-family="ui-monospace, monospace" font-size="8"
          fill="#475569" text-anchor="middle">same-host / dep-chain / subnet</text>
  </g>
  <!-- Arrow: Correlator → Queue (up) -->
  <line x1="234" y1="150" x2="220" y2="131" stroke="#475569" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr)"/>

  <!-- ================================================================== -->
  <!-- ROW 2: Plan Executor → Handlers → Verify → Audit                   -->
  <!-- ================================================================== -->

  <!-- Arrow: Guardrails → Plan Executor (down) -->
  <line x1="650" y1="138" x2="650" y2="208" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Plan Executor -->
  <g transform="translate(590, 212)">
    <rect width="118" height="52" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
    <text x="59" y="17" font-family="system-ui, sans-serif" font-size="10"
          fill="#a78bfa" text-anchor="middle" font-weight="600">PLAN EXECUTOR</text>
    <text x="59" y="33" font-family="ui-monospace, monospace" font-size="8"
          fill="#64748b" text-anchor="middle">multi-step plans</text>
    <text x="59" y="45" font-family="ui-monospace, monospace" font-size="8"
          fill="#64748b" text-anchor="middle">step verify + resume</text>
  </g>

  <!-- Arrow: Plan Executor → Handlers -->
  <line x1="586" y1="238" x2="550" y2="238" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Handlers -->
  <g transform="translate(396, 204)">
    <rect width="150" height="86" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="75" y="17" font-family="system-ui, sans-serif" font-size="10"
          fill="#94a3b8" text-anchor="middle" font-weight="600" letter-spacing="1">6 HANDLERS</text>
    <text x="50" y="34" font-family="ui-monospace, monospace" font-size="9"
          fill="#22d3ee" text-anchor="middle">HA</text>
    <text x="110" y="34" font-family="ui-monospace, monospace" font-size="9"
          fill="#22d3ee" text-anchor="middle">Portainer</text>
    <text x="50" y="49" font-family="ui-monospace, monospace" font-size="9"
          fill="#22d3ee" text-anchor="middle">Proxmox</text>
    <text x="110" y="49" font-family="ui-monospace, monospace" font-size="9"
          fill="#22d3ee" text-anchor="middle">UniFi</text>
    <text x="50" y="64" font-family="ui-monospace, monospace" font-size="9"
          fill="#22d3ee" text-anchor="middle">Cloudflare</text>
    <text x="110" y="64" font-family="ui-monospace, monospace" font-size="9"
          fill="#22d3ee" text-anchor="middle">Docker</text>
    <text x="75" y="80" font-family="ui-monospace, monospace" font-size="8"
          fill="#475569" text-anchor="middle">execute + verify actions</text>
  </g>

  <!-- Arrow: Handlers → Audit -->
  <line x1="392" y1="247" x2="360" y2="247" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Audit -->
  <g transform="translate(262, 222)">
    <rect width="94" height="50" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="47" y="17" font-family="system-ui, sans-serif" font-size="10"
          fill="#94a3b8" text-anchor="middle" font-weight="600" letter-spacing="1">AUDIT</text>
    <text x="47" y="33" font-family="ui-monospace, monospace" font-size="10"
          fill="#22d3ee" text-anchor="middle">InfluxDB</text>
    <text x="47" y="46" font-family="ui-monospace, monospace" font-size="8"
          fill="#475569" text-anchor="middle">every decision</text>
  </g>

  <!-- ================================================================== -->
  <!-- ROW 3: Notifications, Web UI, Approval, Learning Loop              -->
  <!-- ================================================================== -->

  <!-- Notifications -->
  <g transform="translate(14, 310)">
    <rect width="178" height="58" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="89" y="17" font-family="system-ui, sans-serif" font-size="10"
          fill="#94a3b8" text-anchor="middle" font-weight="600" letter-spacing="1">8 NOTIFICATION CHANNELS</text>
    <text x="89" y="34" font-family="ui-monospace, monospace" font-size="9"
          fill="#22d3ee" text-anchor="middle">Telegram  Slack  Discord</text>
    <text x="89" y="49" font-family="ui-monospace, monospace" font-size="9"
          fill="#22d3ee" text-anchor="middle">MQTT  Email  Webhook  Web</text>
  </g>

  <!-- Arrow: Audit → Notifications (down-left) -->
  <line x1="280" y1="276" x2="180" y2="306" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Web Admin UI -->
  <g transform="translate(210, 310)">
    <rect width="148" height="58" rx="6" fill="#1e293b" stroke="#22d3ee" stroke-width="1"/>
    <text x="74" y="17" font-family="system-ui, sans-serif" font-size="10"
          fill="#22d3ee" text-anchor="middle" font-weight="600">WEB ADMIN UI</text>
    <text x="74" y="34" font-family="ui-monospace, monospace" font-size="8"
          fill="#94a3b8" text-anchor="middle">dashboard / config / events</text>
    <text x="74" y="47" font-family="ui-monospace, monospace" font-size="8"
          fill="#94a3b8" text-anchor="middle">service map / approvals</text>
  </g>

  <!-- Approval Queue -->
  <g transform="translate(376, 310)">
    <rect width="130" height="58" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1" opacity="0.9"/>
    <text x="65" y="17" font-family="system-ui, sans-serif" font-size="10"
          fill="#f59e0b" text-anchor="middle" font-weight="600">APPROVAL QUEUE</text>
    <text x="65" y="34" font-family="ui-monospace, monospace" font-size="8"
          fill="#64748b" text-anchor="middle">RECOMMEND actions</text>
    <text x="65" y="47" font-family="ui-monospace, monospace" font-size="8"
          fill="#64748b" text-anchor="middle">Web / Telegram / Slack</text>
  </g>

  <!-- Observability -->
  <g transform="translate(524, 310)">
    <rect width="76" height="58" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="38" y="17" font-family="ui-monospace, monospace" font-size="10"
          fill="#818cf8" text-anchor="middle">Grafana</text>
    <text x="38" y="33" font-family="ui-monospace, monospace" font-size="8"
          fill="#475569" text-anchor="middle">dashboards</text>
    <text x="38" y="49" font-family="ui-monospace, monospace" font-size="10"
          fill="#818cf8" text-anchor="middle">Prometheus</text>
  </g>

  <!-- Learning Loop -->
  <g transform="translate(618, 310)">
    <rect width="168" height="58" rx="6" fill="#1e293b" stroke="#34d399" stroke-width="1"/>
    <text x="84" y="17" font-family="system-ui, sans-serif" font-size="10"
          fill="#34d399" text-anchor="middle" font-weight="600">LEARNING LOOP</text>
    <text x="84" y="34" font-family="ui-monospace, monospace" font-size="8"
          fill="#64748b" text-anchor="middle">T2 suggests known fix</text>
    <text x="84" y="47" font-family="ui-monospace, monospace" font-size="8"
          fill="#64748b" text-anchor="middle">candidate → verify → T0</text>
  </g>

  <!-- Learning Loop feedback arrow: Learning → T0 (curved up-left) -->
  <path d="M 702 310 Q 780 200 380 62"
        fill="none" stroke="#34d399" stroke-width="1.2" stroke-dasharray="5,3"
        marker-end="url(#arr-green)" opacity="0.7"/>
  <text x="756" y="206" font-family="ui-monospace, monospace" font-size="8"
        fill="#34d399" opacity="0.7" transform="rotate(-70, 756, 206)">promote</text>

  <!-- Arrow: Audit → Observability (down) -->
  <line x1="309" y1="276" x2="340" y2="306" stroke="#475569" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr)"/>

</svg>
