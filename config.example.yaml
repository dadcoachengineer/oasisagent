# =============================================================================
# OasisAgent Configuration
# =============================================================================
#
# This is the complete configuration reference. Copy to config.yaml and
# customize for your environment.
#
# Secrets use ${VAR} syntax and are resolved from environment variables.
# See .env.example for the full list of expected variables.
# =============================================================================

# -----------------------------------------------------------------------------
# Agent — Global settings
# -----------------------------------------------------------------------------
agent:
  name: oasis-agent             # Instance name (for logging and multi-agent setups)
  log_level: info               # debug, info, warning, error
  event_queue_size: 1000        # Internal event queue buffer size
  dedup_window_seconds: 300     # Events with same dedup key within this window are dropped
  shutdown_timeout: 30          # Seconds to wait for graceful shutdown
  event_ttl: 300                # Default TTL (seconds) for events; per-event TTL takes precedence
  known_fixes_dir: known_fixes/ # Directory containing T0 YAML fix registries
  correlation_window: 30        # Group related events within this window (seconds); 0 to disable
  metrics_port: 0               # Prometheus /metrics port; 0 to disable

# -----------------------------------------------------------------------------
# Ingestion — Event sources
# Each adapter connects to an external system and produces canonical Events.
# Enable only what you use.
# -----------------------------------------------------------------------------
ingestion:

  # MQTT subscriber — connects to any MQTT broker (EMQX, Mosquitto, etc.)
  mqtt:
    enabled: true
    broker: mqtt://localhost:1883
    username: ${MQTT_USER}
    password: ${MQTT_PASS}
    client_id: oasis-agent
    qos: 1
    topics:
      # Each topic mapping tells the agent how to interpret messages on that topic.
      # Fields set to "auto" are inferred from the message payload or topic structure.
      - pattern: "homeassistant/error/#"
        system: homeassistant
        event_type: automation_error
        severity: error
      - pattern: "oasis/alerts/#"
        system: auto
        event_type: auto
        severity: auto

      # --- Zigbee2MQTT ---
      - pattern: "zigbee2mqtt/bridge/state"
        system: zigbee2mqtt
        event_type: bridge_state
        severity: auto
      - pattern: "zigbee2mqtt/bridge/logging"
        system: zigbee2mqtt
        event_type: bridge_log
        severity: auto
      - pattern: "zigbee2mqtt/+/availability"
        system: zigbee2mqtt
        event_type: device_availability
        severity: auto

      # --- Frigate NVR ---
      - pattern: "frigate/available"
        system: frigate
        event_type: service_availability
        severity: auto
      - pattern: "frigate/events"
        system: frigate
        event_type: detection_event
        severity: info
      - pattern: "frigate/stats"
        system: frigate
        event_type: stats
        severity: auto

      # --- ESPresense ---
      - pattern: "espresense/rooms/+/status"
        system: espresense
        event_type: room_status
        severity: auto
      - pattern: "espresense/rooms/+/telemetry"
        system: espresense
        event_type: room_telemetry
        severity: info

      # --- Valetudo (robot vacuums) ---
      - pattern: "valetudo/+/StatusStateAttribute/status"
        system: valetudo
        event_type: vacuum_status
        severity: auto
      - pattern: "valetudo/+/BatteryStateAttribute/level"
        system: valetudo
        event_type: vacuum_battery
        severity: info
      - pattern: "valetudo/+/events"
        system: valetudo
        event_type: vacuum_event
        severity: auto

      # --- WLED ---
      - pattern: "wled/+/status"
        system: wled
        event_type: device_status
        severity: auto

      # --- BirdNET ---
      - pattern: "birdnet/sightings"
        system: birdnet
        event_type: sighting
        severity: info

  # Home Assistant WebSocket — real-time state changes and automation failures
  ha_websocket:
    enabled: true
    url: ws://localhost:8123/api/websocket
    token: ${HA_TOKEN}
    subscriptions:
      # State change monitoring — fires when entities transition to bad states
      state_changes:
        enabled: true
        trigger_states: ["unavailable", "unknown"]
        # Entities that are expected to be temporarily unavailable (battery sensors, etc.)
        ignore_entities: []
        # Debounce: entity must be in bad state for this many seconds before emitting event
        min_duration: 60
      # Automation failure tracking
      automation_failures:
        enabled: true
      # Service call error tracking
      service_call_errors:
        enabled: true

  # Home Assistant Log Poller — pattern-match against HA error logs
  ha_log_poller:
    enabled: true
    url: http://localhost:8123
    token: ${HA_TOKEN}
    poll_interval: 30            # Seconds between polls
    dedup_window: 300            # Same error within this window = one event
    patterns:
      # Each pattern matches against "component_name: message" from system_log/list.
      # First match wins per entry. Capture group 1 becomes the event's entity_id.
      # Severity here is a fallback — HA's native log level takes precedence.

      # Integration setup failures (e.g., zwave_js, mqtt, hue)
      - regex: "Error setting up integration '(.+)'"
        event_type: integration_failure
        severity: error

      # Automation execution errors
      # HA logs: "Error while executing automation automation.<id>: <details>"
      - regex: "Error while executing automation automation\\.([^:]+)"
        event_type: automation_error
        severity: error

      # Script/action errors within automations (service calls, conditions)
      # HA logs: "<Alias>: Error executing script. Error for call_service at pos N: <details>"
      - regex: "Error executing script.+for (\\w+) at pos"
        event_type: automation_error
        severity: error

      # Template rendering errors in automations and scripts
      # HA logs: "Template variable error: 'dict object' has no attribute '...'"
      - regex: "Template variable error: (.+)"
        event_type: template_error
        severity: error

      # Service parameter deprecation warnings (e.g., kelvin → color_temp_kelvin)
      # HA logs: "Got `kelvin` argument in `turn_on` service, which is deprecated..."
      - regex: "Got `(.+)` argument.+which is deprecated"
        event_type: deprecation_warning
        severity: warning

      # Configuration/schema validation errors
      # HA logs: "Invalid config for [automation]: not a valid value..."
      - regex: "Invalid config for \\[([^\\]]+)\\]"
        event_type: config_error
        severity: error

      # Entity unavailability (generic catch-all)
      - regex: "(.+) is unavailable"
        event_type: state_unavailable
        severity: warning

  # Uptime Kuma — external monitoring via Prometheus /metrics endpoint
  uptime_kuma:
    enabled: false
    url: http://uptime-kuma:3001       # Uptime Kuma base URL
    api_key: "${UPTIME_KUMA_API_KEY:-}"  # API key (v1.21+, used as Basic auth password)
    poll_interval: 60                  # Seconds between polls
    timeout: 10
    response_time_threshold_ms: 5000   # Emit WARNING when response time exceeds this
    cert_warning_days: 30              # Certificate expiry warning threshold
    cert_critical_days: 7              # Certificate expiry critical threshold

# -----------------------------------------------------------------------------
# Scanner — Preventive scanning framework
# Proactive health checks that catch issues before they cause outages.
# Each scanner runs as its own ingestion adapter on a configurable interval.
# -----------------------------------------------------------------------------
scanner:
  enabled: false
  interval: 900                    # Global default interval (seconds); per-check overrides below
  adaptive_enabled: true           # Shorten interval after detecting issues, restore after clean scans
  adaptive_fast_factor: 0.25       # Multiply interval by this when in fast mode (900s → 225s)
  adaptive_recovery_scans: 3       # Consecutive clean scans before restoring normal interval

  # TLS certificate expiry — checks cert validity from OasisAgent's vantage point
  certificate_expiry:
    enabled: false
    endpoints:                     # hostname or hostname:port
      - example.com
      - nas.example.com:8443
    warning_days: 30               # Emit WARNING when cert expires within N days
    critical_days: 7               # Emit ERROR when cert expires within N days
    interval: 900                  # Check interval (seconds); min 60

  # Disk space usage — monitors local filesystem paths
  disk_space:
    enabled: false
    paths:
      - /
      - /var/lib/docker
    warning_threshold_pct: 85      # Emit WARNING when usage >= N%
    critical_threshold_pct: 95     # Emit ERROR when usage >= N%
    interval: 900                  # Check interval (seconds); min 60

  # Home Assistant integration health — detects integrations in error state
  # Requires handlers.homeassistant to be enabled (uses its URL and token)
  ha_health:
    enabled: false
    interval: 900                  # Check interval (seconds); min 60

  # Docker container health — detects unhealthy, exited, or restarting containers
  # Requires handlers.docker to be enabled (uses its socket/URL)
  docker_health:
    enabled: false
    ignore_containers: []          # Container names to skip (e.g., ["temp-builder"])
    interval: 900                  # Check interval (seconds); min 60

# -----------------------------------------------------------------------------
# LLM — Language model configuration
# OasisAgent is provider-agnostic. Any OpenAI-compatible endpoint works:
# Ollama, LM Studio, vLLM, llama.cpp, or any cloud provider via LiteLLM.
# -----------------------------------------------------------------------------
llm:

  # T1 — Triage: Local small language model for classification and context packaging
  # Default: Ollama at localhost. For cloud-hosted triage (e.g., OpenRouter):
  #   base_url: https://openrouter.ai/api/v1
  #   model: meta-llama/llama-3.1-8b-instruct
  #   api_key: ${TRIAGE_LLM_API_KEY}
  #   timeout: 15
  triage:
    base_url: http://localhost:11434/v1    # Ollama default
    model: qwen2.5:7b
    api_key: ${TRIAGE_LLM_API_KEY:-not-needed}
    timeout: 5                   # Seconds — local models should respond fast
    max_tokens: 1024
    temperature: 0.1             # Low temp for consistent classification

  # T2 — Reasoning: Cloud model for novel failure diagnosis
  reasoning:
    base_url: https://api.anthropic.com
    model: claude-sonnet-4-5-20250929    # Or claude-opus-4-6, gpt-4o, gemini-2.0-flash, etc.
    api_key: ${REASONING_LLM_API_KEY}
    timeout: 45                  # Cloud models can take longer
    max_tokens: 4096
    temperature: 0.2

  # Shared LLM options
  options:
    cost_tracking: true          # Track token usage and estimated cost per role
    retry_attempts: 2            # Retries on transient failures (timeout, 5xx)
    fallback_to_triage: true     # If reasoning endpoint is down, T1 attempts diagnosis
    log_prompts: false           # WARNING: enables logging of full prompts (may contain secrets)

# -----------------------------------------------------------------------------
# Handlers — Managed system integrations
# Each handler knows how to interact with one system's API.
# Enable only the systems you want OasisAgent to manage.
# -----------------------------------------------------------------------------
handlers:

  # Home Assistant — automation errors, state monitoring, integration restarts
  homeassistant:
    enabled: true
    url: http://localhost:8123
    token: ${HA_TOKEN}
    verify_timeout: 30           # Seconds to wait after action to verify effect
    verify_poll_interval: 2.0    # Seconds between verification polls

  # Docker — container health and restart (Phase 2)
  docker:
    enabled: false
    socket: unix:///var/run/docker.sock
    # For remote Docker hosts (TCP + TLS recommended for Swarm nodes):
    # socket: ""                 # Clear socket when using TCP
    # url: tcp://docker-host:2376
    # tls_verify: true
    # tls_ca: /certs/ca.pem
    # tls_cert: /certs/cert.pem
    # tls_key: /certs/key.pem
    verify_timeout: 30           # Seconds to wait after restart to verify container running
    verify_poll_interval: 2.0    # Seconds between verification polls

  # Portainer — Docker management via Portainer REST API (Phase 3)
  portainer:
    enabled: false
    url: https://localhost:9443
    api_key: ${PORTAINER_API_KEY:-}
    endpoint_id: 1               # Portainer environment ID
    verify_ssl: false

  # Proxmox — VM/CT management (Phase 3)
  proxmox:
    enabled: false
    url: https://localhost:8006
    user: ${PROXMOX_USER}
    token_name: ${PROXMOX_TOKEN_NAME}
    token_value: ${PROXMOX_TOKEN_VALUE}
    verify_ssl: false

# -----------------------------------------------------------------------------
# Guardrails — Safety controls
# These are enforced in code, not in model prompts. The LLM never decides
# whether to act — it classifies and recommends. Guardrails decide.
# -----------------------------------------------------------------------------
guardrails:

  # Entity patterns that are permanently blocked from any automated action.
  # Uses glob-style matching against entity_id.
  blocked_domains:
    - "lock.*"
    - "alarm_control_panel.*"
    - "camera.*"
    - "cover.*"

  # Additional specific entities to block (user-defined)
  blocked_entities: []

  # Master switches
  kill_switch: false             # Set true to disable ALL automated actions instantly
  dry_run: false                 # Set true to log every decision without executing anything
  approval_timeout_minutes: 30   # RECOMMEND actions expire after this many minutes without approval

  # Circuit breaker — prevents remediation loops
  circuit_breaker:
    max_attempts_per_entity: 3   # Max remediation attempts per entity per rolling window
    window_minutes: 60           # Rolling window for attempt counting
    cooldown_minutes: 15         # Minimum time between retry attempts on same entity
    global_failure_rate_threshold: 0.3  # 30% failure rate across all actions = global pause
    global_pause_minutes: 30     # Duration of global pause when threshold is breached

# -----------------------------------------------------------------------------
# Audit — Action logging
# Every event, decision, and action is logged to InfluxDB. Non-negotiable.
# If the agent touched something, there's a record.
# -----------------------------------------------------------------------------
audit:
  influxdb:
    enabled: true
    url: http://localhost:8086
    token: ${INFLUXDB_TOKEN}
    org: myorg
    bucket: oasisagent
  retention_days: 90             # How long to keep audit records

# -----------------------------------------------------------------------------
# Notifications — Alert channels
# Messages are sent for: RECOMMEND/ESCALATE decisions, AUTO_FIX results,
# circuit breaker trips, and agent lifecycle events (start/stop/error).
# -----------------------------------------------------------------------------
notifications:

  # MQTT notifications — publishes to a configurable topic
  mqtt:
    enabled: true
    broker: mqtt://localhost:1883
    topic_prefix: oasis/notifications
    username: ${MQTT_USER}
    password: ${MQTT_PASS}

  # Email notifications (SMTP)
  email:
    enabled: false
    smtp_host: localhost
    smtp_port: 587
    username: "${SMTP_USER:-}"
    password: "${SMTP_PASS:-}"
    starttls: true
    from: oasis-agent@example.com
    to:
      - admin@example.com

  # Webhook notifications (POST JSON to URL)
  webhook:
    enabled: false
    urls:
      - https://hooks.example.com/oasis
