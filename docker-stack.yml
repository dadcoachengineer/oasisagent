# OasisAgent Docker Swarm Stack
#
# Deploy:
#   1. Create secrets and config (see comments below)
#   2. docker stack deploy -c docker-stack.yml oasisagent
#
# Prerequisites:
#   - GHCR image built and pushed (triggered by version tags)
#   - Existing services reachable on the overlay network:
#     MQTT broker, InfluxDB, Grafana, LLM endpoint
#
# Secrets setup:
#   echo "your_ha_token" | docker secret create oasis_ha_token -
#   echo "your_mqtt_pass" | docker secret create oasis_mqtt_pass -
#   echo "your_llm_key" | docker secret create oasis_reasoning_llm_key -
#   echo "your_influxdb_token" | docker secret create oasis_influxdb_token -
#   echo "your_smtp_pass" | docker secret create oasis_smtp_pass -
#   echo "your_openrouter_key" | docker secret create oasis_triage_llm_key -
#
# Config setup:
#   docker config create oasis_config config.yaml

version: "3.8"

services:
  agent:
    image: ghcr.io/dadcoachengineer/oasisagent:${OASIS_VERSION:-latest}
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 5
        window: 120s
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
      update_config:
        parallelism: 1
        delay: 30s
        order: stop-first
    configs:
      - source: oasis_config
        target: /app/config.yaml
        mode: 0444
    secrets:
      - oasis_ha_token
      - oasis_mqtt_pass
      - oasis_reasoning_llm_key
      - oasis_triage_llm_key
      - oasis_influxdb_token
      - oasis_smtp_pass
    environment:
      # Secrets are mounted as files at /run/secrets/<name>
      # config.yaml references these via ${VAR} interpolation
      HA_TOKEN_FILE: /run/secrets/oasis_ha_token
      MQTT_PASS_FILE: /run/secrets/oasis_mqtt_pass
      REASONING_LLM_API_KEY_FILE: /run/secrets/oasis_reasoning_llm_key
      TRIAGE_LLM_API_KEY_FILE: /run/secrets/oasis_triage_llm_key
      INFLUXDB_TOKEN_FILE: /run/secrets/oasis_influxdb_token
      SMTP_PASS_FILE: /run/secrets/oasis_smtp_pass
    networks:
      - oasis
    ports:
      - target: 9090
        published: 9090
        protocol: tcp
        mode: ingress

configs:
  oasis_config:
    external: true

secrets:
  oasis_ha_token:
    external: true
  oasis_mqtt_pass:
    external: true
  oasis_reasoning_llm_key:
    external: true
  oasis_triage_llm_key:
    external: true
  oasis_influxdb_token:
    external: true
  oasis_smtp_pass:
    external: true

networks:
  oasis:
    driver: overlay
    attachable: true
